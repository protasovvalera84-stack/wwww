# =============================================================================
# NexaLink Nginx Configuration — Anti-DDoS Hardened
# Protects against: HTTP flood, slowloris, connection exhaustion,
# amplification, application-layer attacks, bot scraping
# =============================================================================

# ===== RATE LIMITING ZONES =====
# Each zone tracks requests per IP in shared memory

# Login: 5 requests/sec (prevents credential brute-force)
limit_req_zone $binary_remote_addr zone=synapse_login:10m rate=5r/s;

# Register: 2 requests/sec (prevents mass account creation)
limit_req_zone $binary_remote_addr zone=synapse_register:10m rate=2r/s;

# Matrix API: 30 requests/sec (normal chat usage)
limit_req_zone $binary_remote_addr zone=api_matrix:20m rate=30r/s;

# Static files: 50 requests/sec (assets, images)
limit_req_zone $binary_remote_addr zone=static_files:10m rate=50r/s;

# Global fallback: 20 requests/sec per IP
limit_req_zone $binary_remote_addr zone=global:20m rate=20r/s;

# Media upload: 3 requests/sec (prevents storage flood)
limit_req_zone $binary_remote_addr zone=media_upload:10m rate=3r/s;

# ===== CONNECTION LIMITING =====
# Max simultaneous connections per IP
limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

# Max connections per server
limit_conn_zone $server_name zone=conn_per_server:10m;

# ===== GZIP COMPRESSION =====
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 256;
gzip_types
    text/plain text/css text/xml text/javascript
    application/json application/javascript application/xml
    application/rss+xml application/atom+xml
    image/svg+xml font/woff2 font/woff;

# ===== ANTI-DDOS: GLOBAL SETTINGS =====

# Limit request body size (prevents large payload attacks)
client_max_body_size 50m;

# Timeout settings (kills slowloris connections)
client_body_timeout 10s;
client_header_timeout 10s;
send_timeout 10s;
keepalive_timeout 30s;
keepalive_requests 100;

# Limit buffer sizes (prevents buffer overflow attacks)
client_body_buffer_size 16k;
client_header_buffer_size 1k;
large_client_header_buffers 4 8k;

# Limit request rate for the entire server
limit_req_status 429;
limit_conn_status 429;

# Log format with request timing for monitoring
log_format ddos '$remote_addr - $request_time - $status - "$request" - "$http_user_agent"';

# ===== MAP: Block known bad user agents =====
map $http_user_agent $bad_bot {
    default 0;
    ~*(?:bot|crawl|spider|scan|nikto|sqlmap|nmap|masscan|zgrab|python-requests|go-http|curl/7|wget|httperf|siege|ab$|wrk|bombardier|slowhttptest|slowloris|goldeneye|hulk|torshammer|loic|hoic) 1;
}

# ===== MAP: Block empty user agents =====
map $http_user_agent $empty_ua {
    default 0;
    "" 1;
}

# ===== MAP: Block suspicious request methods =====
map $request_method $bad_method {
    default 0;
    ~*(?:TRACE|TRACK|DEBUG|CONNECT) 1;
}

server {
    listen 0.0.0.0:80 default_server;
    server_name _;

    # DNS resolver for Docker (prevents crash when upstream not ready)
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    # --- Connection limits ---
    limit_conn conn_per_ip 50;
    limit_conn conn_per_server 5000;

    # --- Block bad bots and empty user agents ---
    if ($bad_bot) { return 444; }
    if ($empty_ua) { return 444; }
    if ($bad_method) { return 444; }

    # --- Block requests with no Host header (scanner detection) ---
    if ($host = "") { return 444; }

    # --- Security headers (hardened) ---
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=*, microphone=*, display-capture=*, geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; media-src 'self' blob:; connect-src 'self' wss: ws: https://tenor.googleapis.com; frame-ancestors 'self'" always;
    add_header X-DNS-Prefetch-Control off always;
    add_header X-Download-Options noopen always;
    add_header X-Permitted-Cross-Domain-Policies none always;

    # CORS for mobile apps
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With" always;

    # --- NexaLink UI (main interface) ---
    location / {
        limit_req zone=global burst=30 nodelay;
        root /usr/share/nginx/www/nexalink;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Cache static assets aggressively
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            limit_req zone=static_files burst=100 nodelay;
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # Don't cache HTML (SPA routing)
        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }

    # --- Fallback web client ---
    location /element/ {
        limit_req zone=global burst=20 nodelay;
        set $upstream_element element:80;
        proxy_pass http://$upstream_element/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location = /element { return 301 /element/; }

    # --- Matrix API (rate limited) ---
    location /_matrix {
        limit_req zone=api_matrix burst=50 nodelay;
        limit_conn conn_per_ip 30;

        set $upstream_synapse synapse:8008;
        proxy_pass http://$upstream_synapse;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support for sync
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 600s;
        proxy_buffering off;
    }

    # --- Media downloads (separate limits) ---
    location /_matrix/media {
        limit_req zone=api_matrix burst=20 nodelay;
        limit_conn conn_per_ip 10;

        set $upstream_synapse synapse:8008;
        proxy_pass http://$upstream_synapse;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_read_timeout 300s;
        client_max_body_size 50m;
    }

    # --- Media upload (strict rate limit) ---
    location /_matrix/media/v3/upload {
        limit_req zone=media_upload burst=5 nodelay;
        limit_conn conn_per_ip 3;

        set $upstream_synapse synapse:8008;
        proxy_pass http://$upstream_synapse;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;

        client_max_body_size 50m;
        proxy_read_timeout 120s;
    }

    # --- Login (strict rate limit — anti brute-force) ---
    location /_matrix/client/v3/login {
        limit_req zone=synapse_login burst=10 nodelay;
        limit_conn conn_per_ip 5;

        set $upstream_synapse synapse:8008;
        proxy_pass http://$upstream_synapse;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Register (very strict — anti spam) ---
    location /_matrix/client/v3/register {
        limit_req zone=synapse_register burst=5 nodelay;
        limit_conn conn_per_ip 3;

        set $upstream_synapse synapse:8008;
        proxy_pass http://$upstream_synapse;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Server discovery ---
    location /.well-known/matrix/ {
        limit_req zone=global burst=10 nodelay;
        set $upstream_synapse synapse:8008;
        proxy_pass http://$upstream_synapse;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # --- Admin API (very restricted) ---
    location /_synapse {
        limit_req zone=synapse_login burst=5 nodelay;
        limit_conn conn_per_ip 3;

        set $upstream_synapse synapse:8008;
        proxy_pass http://$upstream_synapse;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # --- Admin Panel UI (Synapse Admin) ---
    # etkecc/synapse-admin uses SWS (Static Web Server) on port 8080
    # rewrite strips /admin/ prefix so assets load correctly
    location /admin {
        rewrite ^/admin$ /admin/ permanent;
        rewrite ^/admin/(.*)$ /$1 break;

        proxy_pass http://synapse-admin:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }

    # --- Config panel ---
    location = /config {
        limit_req zone=synapse_login burst=5 nodelay;
        set $upstream_api admin-api:9090;
        proxy_pass http://$upstream_api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/ {
        limit_req zone=api_matrix burst=20 nodelay;
        set $upstream_api admin-api:9090;
        proxy_pass http://$upstream_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # --- Platform installers ---
    location /installers/ {
        limit_req zone=static_files burst=10 nodelay;
        alias /usr/share/nginx/www/installers/;
        autoindex off;
        default_type application/octet-stream;

        add_header Content-Disposition 'attachment' always;
        add_header Cache-Control 'public, max-age=3600' always;
        add_header X-Content-Type-Options 'nosniff' always;

        types {
            application/x-bat bat;
            application/x-sh sh;
            application/x-executable AppImage;
            application/x-msdownload exe;
            application/vnd.android.package-archive apk;
            text/html html;
        }

        sendfile on;
        tcp_nopush on;
        tcp_nodelay on;
    }
    location /installers/desktop/ {
        alias /usr/share/nginx/www/nexalink/installers/desktop/;
        autoindex off;
        default_type application/octet-stream;
        types {
            application/x-msdownload exe;
            application/x-executable AppImage;
            application/x-debian-package deb;
            application/octet-stream blockmap;
        }
        add_header Content-Disposition 'attachment' always;
        add_header Cache-Control 'public, max-age=3600' always;
        add_header X-Content-Type-Options 'nosniff' always;
        sendfile on;
        tcp_nopush on;
        tcp_nodelay on;
    }

    # --- Health check (no rate limit) ---
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # --- Block common attack paths ---
    location ~ /\.(git|env|htaccess|htpasswd|svn|DS_Store) {
        return 444;
    }
    location ~ \.(php|asp|aspx|jsp|cgi)$ {
        return 444;
    }
    location /wp-admin { return 444; }
    location /wp-login { return 444; }
    location /xmlrpc.php { return 444; }
    location /phpmyadmin { return 444; }

    # --- Access log for DDoS monitoring ---
    access_log /var/log/nginx/access.log ddos;
    error_log /var/log/nginx/error.log warn;
}
