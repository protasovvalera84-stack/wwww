# NexaLink Server Configuration — WhatsApp-style hybrid/relay model
# This file is templated by setup.sh using envsubst.
# Variables like ${VAR_NAME} are replaced during setup.
#
# RELAY MODEL:
#   Messages live on the server for at most 1 day.
#   Once all devices have synced, purge jobs remove the events.
#   Clients (mobile/desktop) store a permanent local copy (IndexedDB / Room DB).
#   The server is a relay, not a long-term store.
#   Media is retained for 30 days to allow lazy download on new devices.

server_name: "${SERVER_NAME}"

pid_file: /data/homeserver.pid

listeners:
  - port: 8008
    tls: false
    type: http
    x_forwarded: true
    bind_addresses: ["0.0.0.0"]
    resources:
      - names: [client, federation]
        compress: false

# --- Database (PostgreSQL) ---
database:
  name: psycopg2
  args:
    user: "${POSTGRES_USER}"
    password: "${POSTGRES_PASSWORD}"
    database: "${POSTGRES_DB}"
    host: postgres
    port: 5432
    cp_min: 5
    cp_max: 10

# --- Logging ---
log_config: /data/log.config

# --- Media storage ---
# WhatsApp model: media is encrypted AES-256 CLIENT-SIDE before upload.
# The server stores only encrypted blobs — it cannot read any media content.
# Authentication required to download (even encrypted blobs need auth).
media_store_path: /data/media_store
max_upload_size: 100M
# REQUIRED: prevents unauthenticated access to media URLs
enable_authenticated_media: true
# Disable URL previews — server would fetch URLs and log them (privacy leak)
url_preview_enabled: false

# --- Registration ---
enable_registration: ${ENABLE_REGISTRATION}
enable_registration_without_verification: ${ENABLE_REGISTRATION}
registration_shared_secret: "${REGISTRATION_SHARED_SECRET}"
enable_set_displayname: true
enable_set_avatar_url: true

# --- Room Directory ---
allow_public_rooms_without_auth: true
allow_public_rooms_over_federation: false

# --- Security ---
report_stats: false
macaroon_secret_key: "${MACAROON_SECRET}"
form_secret: "${FORM_SECRET}"
signing_key_path: /data/signing.key

# --- TURN server (for voice/video calls) ---
turn_uris:
  - "stun:${SERVER_HOST}:${TURN_PORT}"
  - "turn:${SERVER_HOST}:${TURN_PORT}?transport=udp"
  - "turn:${SERVER_HOST}:${TURN_PORT}?transport=tcp"
turn_shared_secret: "${TURN_SECRET}"
turn_user_lifetime: 86400000
turn_allow_guests: true

# --- Rate limiting (relaxed for small deployments) ---
rc_message:
  per_second: 5
  burst_count: 20

rc_login:
  address:
    per_second: 1
    burst_count: 5
  account:
    per_second: 1
    burst_count: 5

# --- User directory ---
user_directory:
  enabled: true
  search_all_users: true
  prefer_local_users: true

# --- Presence ---
presence:
  enabled: true

# --- Push notifications ---
# WhatsApp model: NEVER include message content in push payloads.
# Push only sends a "new message" signal — the app fetches and decrypts
# the actual content from the server using E2EE.
# This prevents Apple/Google push servers from reading your messages.
push:
  include_content: false

# ============================================================================
# HYBRID RELAY MODEL — WhatsApp-style message lifecycle
#
# Policy:
#   min_lifetime: 0s     — messages may be deleted as soon as all recipients sync
#   max_lifetime: 1d     — hard cap: messages vanish from server after 1 day
#
# Purge jobs run every 6 hours to keep the server storage lean.
# Clients must sync within 1 day to receive messages.
# All clients use local persistence (IndexedDB / Room DB / SQLite) as
# the permanent archive — the server only holds messages in transit.
# ============================================================================
retention:
  enabled: true
  # WhatsApp model: messages exist on server only until all recipients sync.
  # min_lifetime: 0s  — may be deleted immediately after all devices sync
  # max_lifetime: 6h  — hard cap: messages gone from server within 6 hours
  # (WhatsApp is ~24h; 6h is more aggressive and closer to "delete after delivery")
  default_policy:
    min_lifetime: 0s
    max_lifetime: 6h
  # Purge jobs run every hour to keep the server storage near-zero
  purge_jobs:
    - shortest_max_lifetime: 0s
      longest_max_lifetime: 6h
      interval: 1h
    - longest_max_lifetime: 6h
      interval: 1h

# ============================================================================
# MEDIA RETENTION — 24 hours on server (WhatsApp model)
#
# Media is encrypted AES-256 CLIENT-SIDE before upload.
# Server stores only encrypted blobs.
# Once the recipient downloads the blob, the media-purger service deletes it.
# Hard cap: 24 hours regardless of download status.
# ============================================================================
media_retention:
  local_media_lifetime: 24h
  remote_media_lifetime: 24h

# --- Forgotten rooms cleanup ---
forgotten_room_retention_period: 7d

# --- Stale device cleanup ---
# Remove device records for clients that haven't synced in 30 days.
# This ensures purge jobs aren't blocked waiting for ghost devices.
delete_stale_devices_after: 30d

# --- Trusted key servers ---
trusted_key_servers:
  - server_name: "matrix.org"

suppress_key_server_warning: true

# --- Metrics (Prometheus) ---
enable_metrics: true

# --- Redis (caching + worker communication) ---
redis:
  enabled: true
  host: redis
  port: 6379

# --- Caching ---
caches:
  global_factor: 1.0
  per_cache_factors:
    get_users_in_room: 2.0
    get_room_summary: 2.0
    _get_state_group_for_event: 2.0

# --- Performance ---
federation_rr_transactions_per_room_per_second: 50

# --- Worker mode (optional, for scaling) ---
# Uncomment and configure for high-load deployments.
# instance_map:
#   main:
#     host: synapse
#     port: 8008
