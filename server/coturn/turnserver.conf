# NexaLink - Coturn TURN Server Configuration
# Templated by setup.sh using envsubst.

# Network
listening-port=3478
tls-listening-port=5349
external-ip=${SERVER_HOST}
min-port=49152
max-port=49172
fingerprint
lt-cred-mech

# Authentication
use-auth-secret
static-auth-secret=${TURN_SECRET}
realm=${SERVER_NAME}

# Logging (output to stdout for Docker)
log-file=stdout
verbose

# Security
no-multicast-peers
no-cli
no-tlsv1
no-tlsv1_1

# Performance
total-quota=100
stale-nonce=600
