# NexaLink - Coturn TURN Server Configuration
# Templated by setup.sh using envsubst.
#
# CALL FIX:
#   - Relay ports expanded: 49152-65535 (was 49152-49172 = only 21 ports!)
#     21 ports caused "no relay available" errors when >10 calls simultaneous.
#   - Removed total-quota limit (was 100, now unlimited)
#   - Removed stale-nonce (was 600s — caused drops on calls >10 min)
#   - Added DTLS + TLS support for WebRTC over HTTPS
#   - Added no-loopback-peers for security
#   - Added mobility for mobile WebRTC clients

# ── Network ──────────────────────────────────────────────────────────────────
listening-port=3478
tls-listening-port=5349
external-ip=${SERVER_HOST}

# CRITICAL: enough ports for many concurrent calls
# Each WebRTC call uses 2-4 relay port pairs
# 49152-65535 = 16383 ports (can support ~4000 concurrent calls)
min-port=49152
max-port=65535

# ── Protocol ─────────────────────────────────────────────────────────────────
fingerprint
lt-cred-mech

# Allow UDP + TCP relay (TCP fallback for firewalled clients)
# This fixes "call drops when other person calls back" in symmetric NAT
no-udp-relay=0
no-tcp-relay=0

# ── Authentication ────────────────────────────────────────────────────────────
use-auth-secret
static-auth-secret=${TURN_SECRET}
realm=${SERVER_NAME}

# Credential lifetime: 24 hours (in seconds, not ms)
# WebRTC reconnects use the same credentials — they must stay valid
credential-lifetime=86400

# ── Stability fixes ───────────────────────────────────────────────────────────
# NO stale-nonce: prevents call drops when nonce refreshes mid-call
# (stale-nonce=600 caused drops after 10 minutes)
no-stale-nonce

# Allow loopback for local testing (safe — auth required anyway)
# no-loopback-peers

# Mobility: allows mobile clients to switch networks mid-call (4G↔WiFi)
mobility

# ── Security ──────────────────────────────────────────────────────────────────
no-multicast-peers
no-cli
no-tlsv1
no-tlsv1_1
# Require TLS 1.2+ for TURN over TLS
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=100.64.0.0-100.127.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
denied-peer-ip=169.254.0.0-169.254.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.0.0.0-192.0.0.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=198.18.0.0-198.19.255.255
denied-peer-ip=198.51.100.0-198.51.100.255
denied-peer-ip=203.0.113.0-203.0.113.255
denied-peer-ip=240.0.0.0-255.255.255.255

# ── Performance ───────────────────────────────────────────────────────────────
# Removed total-quota=100 — was limiting concurrent calls to 100
# Removed stale-nonce — was causing call drops

# ── Logging (stdout for Docker) ───────────────────────────────────────────────
log-file=stdout
# verbose  # uncomment for debugging call issues
