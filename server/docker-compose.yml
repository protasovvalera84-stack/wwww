# NexaLink Server Stack — Production Ready 2026
# Usage: docker compose up -d
#
# Architecture:
#   Nginx (HTTPS) → Synapse (Matrix) → PgBouncer → PostgreSQL
#                                   → Redis (cache/pub-sub)
#                                   → MinIO  (media S3 storage)
#   Coturn  — WebRTC TURN/STUN relay
#   Sygnal  — Push notifications (FCM / APNs)
#   Prometheus + Grafana — monitoring

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:

  # ── PostgreSQL database ────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: always
    logging: *default-logging
    environment:
      POSTGRES_DB:              ${POSTGRES_DB:-synapse}
      POSTGRES_USER:            ${POSTGRES_USER:-synapse}
      POSTGRES_PASSWORD:        ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_INITDB_ARGS:     "--encoding=UTF8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/optimize.sql:/docker-entrypoint-initdb.d/optimize.sql:ro
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "effective_cache_size=512MB"
      - "-c"
      - "work_mem=8MB"
      - "-c"
      - "max_connections=100"
      - "-c"
      - "wal_buffers=16MB"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "log_min_duration_statement=2000"
    healthcheck:
      test:
        - "CMD-SHELL"
        - >
          psql -U ${POSTGRES_USER:-synapse}
               -d ${POSTGRES_DB:-synapse}
               -c 'SELECT 1'
               -q --no-password 2>&1 | grep -q '1 row'
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 15s
    networks:
      - nexalink

  # ── PgBouncer — PostgreSQL connection pooler ───────────────────────────────
  # Routes all Synapse DB connections through a pool (max 100→20 real conns).
  # Transaction-mode pooling: connections returned after each statement.
  # This is critical at 1K+ users to prevent "too many connections" errors.
  pgbouncer:
    image: bitnami/pgbouncer:latest
    restart: always
    logging: *default-logging
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRESQL_HOST:           postgres
      POSTGRESQL_PORT:           "5432"
      POSTGRESQL_USERNAME:       ${POSTGRES_USER:-synapse}
      POSTGRESQL_PASSWORD:       ${POSTGRES_PASSWORD}
      POSTGRESQL_DATABASE:       ${POSTGRES_DB:-synapse}
      PGBOUNCER_POOL_MODE:       transaction
      PGBOUNCER_MAX_CLIENT_CONN: "400"
      PGBOUNCER_DEFAULT_POOL_SIZE: "20"
      PGBOUNCER_RESERVE_POOL_SIZE: "5"
      PGBOUNCER_SERVER_RESET_QUERY: "DISCARD ALL"
      PGBOUNCER_AUTH_TYPE:       md5
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 5432 -U ${POSTGRES_USER:-synapse}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - nexalink

  # ── Redis (caching + pub/sub for Synapse workers) ─────────────────────────
  redis:
    image: redis:7-alpine
    restart: always
    logging: *default-logging
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save ""
      --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - nexalink

  # ── MinIO — self-hosted S3-compatible media storage ───────────────────────
  # WhatsApp model: clients upload AES-256 encrypted blobs via Synapse.
  # Server stores only ciphertext. 1-day lifecycle = auto-purge after delivery.
  minio:
    image: minio/minio:latest
    restart: always
    logging: *default-logging
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:            ${MINIO_ROOT_USER:-nexalink}
      MINIO_ROOT_PASSWORD:        ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in .env}
      MINIO_PROMETHEUS_AUTH_TYPE: public
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - nexalink

  # MinIO bucket initialiser — creates bucket + lifecycle policy (runs once)
  minio-init:
    image: minio/mc:latest
    restart: "no"
    logging: *default-logging
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-nexalink} ${MINIO_ROOT_PASSWORD} &&
        mc mb --ignore-existing local/nexalink-media &&
        mc anonymous set none local/nexalink-media &&
        echo 'MinIO bucket ready.'
      "
    networks:
      - nexalink

  # ── NexaLink core server (Matrix / Synapse) ────────────────────────────────
  # Built from custom Dockerfile that adds synapse-s3-storage-provider for MinIO.
  synapse:
    build: ./synapse
    restart: always
    user: "991:991"
    logging: *default-logging
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_healthy
    environment:
      SYNAPSE_CONFIG_PATH: /data/homeserver.yaml
    volumes:
      - synapse_data:/data
      - ./synapse/homeserver.yaml:/data/homeserver.yaml:ro
      - ./synapse/log.config:/data/log.config:ro
      - ./synapse/signing.key:/data/signing.key:ro
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8008/health\")' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - nexalink

  # ── Sygnal — push notification gateway ────────────────────────────────────
  # Routes Matrix push events to FCM (Android) and APNs (iOS).
  # Works without app keys too — silently skips unconfigured apps.
  sygnal:
    image: matrixdotorg/sygnal:latest
    restart: always
    logging: *default-logging
    volumes:
      - ./sygnal/sygnal.yaml:/etc/sygnal/sygnal.yaml:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - nexalink

  # ── Element (Matrix web client — fallback UI) ─────────────────────────────
  element:
    image: vectorim/element-web:latest
    restart: always
    logging: *default-logging
    volumes:
      - ./element/config.json:/app/config.json:ro
    networks:
      - nexalink

  # ── Coturn (WebRTC TURN/STUN for voice/video calls) ───────────────────────
  # Relay ports expanded to 49152-65535 (~4000 concurrent WebRTC streams).
  coturn:
    image: coturn/coturn:latest
    restart: always
    logging: *default-logging
    ports:
      - "${TURN_PORT:-3478}:3478/tcp"
      - "${TURN_PORT:-3478}:3478/udp"
      - "${TURN_TLS_PORT:-5349}:5349/tcp"
      - "${TURN_TLS_PORT:-5349}:5349/udp"
      - "49152-65535:49152-65535/udp"
    volumes:
      - ./coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
    networks:
      - nexalink

  # ── Nginx (reverse proxy + static files) ──────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: always
    logging: *default-logging
    depends_on:
      synapse:
        condition: service_started
    ports:
      - "0.0.0.0:${HTTP_PORT:-80}:80"
      - "0.0.0.0:443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/www:/usr/share/nginx/www
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/certbot:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - nexalink

  # ── Synapse Admin panel ────────────────────────────────────────────────────
  synapse-admin:
    image: ghcr.io/etkecc/synapse-admin:latest
    restart: always
    logging: *default-logging
    networks:
      - nexalink

  # ── NexaLink Admin API (server configuration panel at /config) ────────────
  admin-api:
    build: ./admin-api
    restart: always
    logging: *default-logging
    volumes:
      - ./.env:/app/.env:rw
    environment:
      ADMIN_API_PORT: "9090"
    networks:
      - nexalink

  # ── Monitoring: Prometheus ─────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    restart: always
    logging: *default-logging
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    networks:
      - nexalink

  # ── Monitoring: Grafana ────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    restart: always
    logging: *default-logging
    environment:
      GF_SECURITY_ADMIN_USER:          admin
      GF_SECURITY_ADMIN_PASSWORD:      ${GRAFANA_PASSWORD:-nexalink123}
      GF_SERVER_ROOT_URL:              "%(protocol)s://%(domain)s/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH:   "true"
      GF_AUTH_ANONYMOUS_ENABLED:       "false"
      GF_INSTALL_PLUGINS:              "grafana-piechart-panel"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./monitoring/grafana-dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./monitoring/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - nexalink

  # ── Monitoring: Node Exporter (CPU / RAM / disk / network) ────────────────
  node-exporter:
    image: prom/node-exporter:latest
    restart: always
    logging: *default-logging
    command:
      - '--path.rootfs=/host'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - '/:/host:ro,rslave'
    networks:
      - nexalink

  # ── Monitoring: PostgreSQL Exporter ───────────────────────────────────────
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    restart: always
    logging: *default-logging
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:-synapse}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-synapse}?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nexalink

  # ── Media Purger (relay model: delete blobs after download) ───────────────
  media-purger:
    build: ./media-purger
    restart: always
    logging: *default-logging
    depends_on:
      synapse:
        condition: service_started
    environment:
      SYNAPSE_URL:         "http://synapse:8008"
      SYNAPSE_ADMIN_TOKEN: ${SYNAPSE_ADMIN_TOKEN:-}
      MEDIA_MAX_AGE_HOURS: "1"
      PURGE_INTERVAL_MINS: "10"
    networks:
      - nexalink

volumes:
  postgres_data:
  synapse_data:
  minio_data:
  certbot_certs:
  prometheus_data:
  grafana_data:

networks:
  nexalink:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
