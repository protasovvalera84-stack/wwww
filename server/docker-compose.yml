# NexaLink Server Stack
# Usage: docker compose up -d

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  # --- PostgreSQL database ---
  postgres:
    image: postgres:16-alpine
    restart: always
    logging: *default-logging
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-synapse}
      POSTGRES_USER: ${POSTGRES_USER:-synapse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/optimize.sql:/docker-entrypoint-initdb.d/optimize.sql:ro
    command:
      - "postgres"
      - "-c" 
      - "shared_buffers=256MB"
      - "-c"
      - "effective_cache_size=512MB"
      - "-c"
      - "work_mem=4MB"
      - "-c"
      - "max_connections=200"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-synapse}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexalink

  # --- NexaLink core server ---
  synapse:
    image: matrixdotorg/synapse:latest
    restart: always
    user: "991:991"
    logging: *default-logging
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      SYNAPSE_CONFIG_PATH: /data/homeserver.yaml
    volumes:
      - synapse_data:/data
      - ./synapse/homeserver.yaml:/data/homeserver.yaml:ro
      - ./synapse/log.config:/data/log.config:ro
      - ./synapse/signing.key:/data/signing.key:ro
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8008/health\")' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - nexalink

  # --- Redis (caching + pub/sub for workers) ---
  redis:
    image: redis:7-alpine
    restart: always
    logging: *default-logging
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru --save ""
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - nexalink

  # --- NexaLink web client (fallback) ---
  element:
    image: vectorim/element-web:latest
    restart: always
    logging: *default-logging
    volumes:
      - ./element/config.json:/app/config.json:ro
    networks:
      - nexalink

  # --- Coturn (TURN/STUN server for voice/video) ---
  coturn:
    image: coturn/coturn:latest
    restart: always
    logging: *default-logging
    ports:
      - "${TURN_PORT:-3478}:3478/tcp"
      - "${TURN_PORT:-3478}:3478/udp"
      - "${TURN_TLS_PORT:-5349}:5349/tcp"
      - "${TURN_TLS_PORT:-5349}:5349/udp"
      - "${TURN_RELAY_MIN:-49152}-${TURN_RELAY_MAX:-49172}:49152-49172/udp"
    volumes:
      - ./coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
    networks:
      - nexalink

  # --- Nginx (reverse proxy) ---
  nginx:
    image: nginx:alpine
    restart: always
    logging: *default-logging
    depends_on:
      synapse:
        condition: service_started
    ports:
      - "0.0.0.0:${HTTP_PORT:-80}:80"
      - "0.0.0.0:443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/www:/usr/share/nginx/www
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/certbot:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - nexalink

  # --- Admin panel (user/room management) ---
  synapse-admin:
    image: ghcr.io/etkecc/synapse-admin:latest
    restart: always
    logging: *default-logging
    networks:
      - nexalink

  # --- NexaLink Admin API (server configuration panel) ---
  admin-api:
    build: ./admin-api
    restart: always
    logging: *default-logging
    volumes:
      - ./.env:/app/.env:rw
    environment:
      ADMIN_API_PORT: "9090"
    networks:
      - nexalink

  # --- Monitoring: Prometheus ---
  prometheus:
    image: prom/prometheus:latest
    restart: always
    logging: *default-logging
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - nexalink

  # --- Monitoring: Grafana ---
  grafana:
    image: grafana/grafana:latest
    restart: always
    logging: *default-logging
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-nexalink123}
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    networks:
      - nexalink

  # --- Media Purger (WhatsApp relay model) ---
  # Deletes encrypted media blobs from the server after 1h.
  # Messages are purged via Synapse retention module (homeserver.yaml: max_lifetime: 6h).
  # Server NEVER stores plaintext media — all blobs are AES-256-CTR encrypted client-side.
  media-purger:
    build: ./media-purger
    restart: always
    logging: *default-logging
    depends_on:
      synapse:
        condition: service_started
    environment:
      SYNAPSE_URL: "http://synapse:8008"
      SYNAPSE_ADMIN_TOKEN: ${SYNAPSE_ADMIN_TOKEN:-}
      MEDIA_MAX_AGE_HOURS: "1"
      PURGE_INTERVAL_MINS: "10"
    networks:
      - nexalink

  # --- Monitoring: Node Exporter (system metrics) ---
  node-exporter:
    image: prom/node-exporter:latest
    restart: always
    logging: *default-logging
    command:
      - '--path.rootfs=/host'
    volumes:
      - '/:/host:ro,rslave'
    networks:
      - nexalink

volumes:
  postgres_data:
  synapse_data:
  certbot_certs:
  prometheus_data:
  grafana_data:

networks:
  nexalink:
    driver: bridge
